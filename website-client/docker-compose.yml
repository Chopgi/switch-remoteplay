services:
  switch-remoteplay-client:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: switch-client
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - CI=true
    restart: unless-stopped
    stdin_open: true # Equivalent to -i
    tty: true        # Equivalent to -t