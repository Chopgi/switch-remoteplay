name: Client Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'website-client/**'
      - '.github/workflows/client-**'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Required for pushing to GHCR
permissions:
  packages: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Build, Test & Push
        run: |
          # Navigate to the client directory
          pushd website-client
          
          # Prepare the image name (GHCR requires lowercase)
          IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/switch-remoteplay-client
          IMAGE_NAME=$(echo $IMAGE_NAME | tr '[A-Z]' '[a-z]')
          
          echo "Building image: $IMAGE_NAME"

          # 1. Build the image
          docker build -t $IMAGE_NAME:latest .
          
          # 2. Run tests inside the built container
          # CI=true makes the test runner exit after one run instead of watching
          docker run --rm -e CI=true --name test-container $IMAGE_NAME:latest yarn test
          
          # 3. Push to GitHub Container Registry
          docker push $IMAGE_NAME:latest
          
          popd