# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates
#
# MANUAL TRIGGERING:
# While this configuration runs automatically on a weekly schedule, you can also
# manually trigger Dependabot checks at any time through the GitHub UI:
# 1. Go to the "Insights" tab in the GitHub repository
# 2. Click "Dependency graph" in the left sidebar
# 3. Click the "Dependabot" tab
# 4. Click "Check for updates" button for any ecosystem you want to check

version: 2
updates:
  # Enable version updates for npm (website-client)
  - package-ecosystem: "npm"
    directory: "/website-client"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  # Enable version updates for pip (server)
  - package-ecosystem: "pip"
    directory: "/server"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
